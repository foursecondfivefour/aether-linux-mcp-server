# ─── AETHER_02 MAXIMUM HARDENING CONFIG (nightly 2026) ─────────────────────
#
# Reference: https://doc.rust-lang.org/rustc/exploit-mitigations.html
#            https://doc.rust-lang.org/unstable-book/compiler-flags/cf-protection.html
#            RFC 3855 — Mitigation enforcement
#
# CET (IBT + Shadow Stack)       — hardware CFI on Intel 11gen+/AMD Zen4+
# Stack protector                — -Z stack-protector=strong
# Full RELRO                     — GOT read-only + immediate binding
# NX (W^X)                       — non-executable stack/heap
# Separate code                  — read-only .text segment
# strip=true                     — no symbols, no debuginfo
# LLD linker                     — fast LTO-compatible linker
#
# NOTE: -Z sanitizer=cfi omitted because it requires panic=abort on ALL crates
#       including proc-macros, which share the global RUSTFLAGS per-target.
#       For post-2026 nightly where this is per-crate-configurable, add it back.

[target.x86_64-unknown-linux-gnu]
rustflags = [
    # ─── Hardware CFI: Intel CET (IBT + Shadow Stack) ───
    "-Z", "cf-protection=full",

    # ─── Strong stack smashing protector ───
    "-Z", "stack-protector=strong",

    # ─── CPU-specific optimizations ───
    "-C", "target-cpu=native",

    # ─── Force frame pointers (for perf analysis + deeper ASLR) ───
    "-C", "force-frame-pointers=yes",

    # ─── Linker: Full RELRO + BIND_NOW ───
    "-C", "link-arg=-Wl,-z,relro",
    "-C", "link-arg=-Wl,-z,now",

    # ─── Linker: No-execute stack ───
    "-C", "link-arg=-Wl,-z,noexecstack",

    # ─── Linker: Read-only code segments ───
    "-C", "link-arg=-Wl,-z,separate-code",

    # ─── Linker: Use LLD for speed + LTO compat ───
    "-C", "link-arg=-fuse-ld=lld",

    # ─── Linker: CET report (warn about non-CET objects) ───
    "-C", "link-arg=-Wl,-z,cet-report=warning",

    # ─── Linker: Pack DT_RELR relative relocations ───
    "-C", "link-arg=-Wl,-z,pack-relative-relocs",
]

[target.x86_64-unknown-linux-musl]
rustflags = [
    "-Z", "cf-protection=full",
    "-Z", "stack-protector=strong",
    "-C", "target-cpu=native",
    "-C", "target-feature=+crt-static",
    "-C", "force-frame-pointers=yes",
    "-C", "link-arg=-Wl,-z,relro",
    "-C", "link-arg=-Wl,-z,now",
    "-C", "link-arg=-Wl,-z,noexecstack",
    "-C", "link-arg=-Wl,-z,separate-code",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-Wl,-z,pack-relative-relocs",
]
