name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -j 1

      - name: Stage artifact
        run: |
          set -euo pipefail
          mkdir -p staging
          cp target/release/aether-mcp-server staging/aether-mcp-server
          chmod +x staging/aether-mcp-server
          tar -C staging -czf aether-mcp-server-linux-x86_64.tar.gz aether-mcp-server
          sha256sum staging/aether-mcp-server aether-mcp-server-linux-x86_64.tar.gz > SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aether-mcp-server-linux-x86_64
          path: |
            staging/aether-mcp-server
            aether-mcp-server-linux-x86_64.tar.gz
            SHA256SUMS

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            staging/aether-mcp-server \
            aether-mcp-server-linux-x86_64.tar.gz \
            SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --title "AETHER_02 ${GITHUB_REF_NAME}" \
            --notes "Linux release build for AETHER_02."
