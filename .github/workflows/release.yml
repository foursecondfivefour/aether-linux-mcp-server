name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v. Empty = read Cargo.toml"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: aether-mcp-server
  PACKAGE_NAME: aether-linux-mcp-server

jobs:
  release:
    name: Build and publish Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Resolve release tag
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            create_tag="false"
          else
            version="${INPUT_VERSION}"
            if [[ -z "${version}" ]]; then
              version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
            fi
            version="${version#v}"
            tag="v${version}"
            create_tag="true"
          fi

          if [[ -z "${version}" || -z "${tag}" ]]; then
            echo "Could not resolve release version/tag" >&2
            exit 1
          fi

          if [[ "${INPUT_PRERELEASE:-false}" == "true" ]]; then
            prerelease_flag="--prerelease"
          else
            prerelease_flag=""
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "create_tag=${create_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease_flag=${prerelease_flag}" >> "${GITHUB_OUTPUT}"

          echo "Release version: ${version}"
          echo "Release tag: ${tag}"

      - name: Create tag for manual release
        if: steps.meta.outputs.create_tag == 'true'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally."
          elif git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; fetching it."
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Validate Rust formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release -j 1

      - name: Stage release assets
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          mkdir -p dist staging
          cp "target/release/${BIN_NAME}" "dist/${BIN_NAME}"
          chmod +x "dist/${BIN_NAME}"

          cp "dist/${BIN_NAME}" "staging/${BIN_NAME}"
          tar -C staging -czf "dist/${BIN_NAME}-linux-x86_64.tar.gz" "${BIN_NAME}"

          (
            cd dist
            sha256sum "${BIN_NAME}" "${BIN_NAME}-linux-x86_64.tar.gz" > SHA256SUMS
          )

          ls -lah dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aether-mcp-server-linux-x86_64-${{ steps.meta.outputs.tag }}
          path: |
            dist/aether-mcp-server
            dist/aether-mcp-server-linux-x86_64.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          PRERELEASE_FLAG: ${{ steps.meta.outputs.prerelease_flag }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; replacing assets."
            gh release upload "${TAG}" \
              dist/aether-mcp-server \
              dist/aether-mcp-server-linux-x86_64.tar.gz \
              dist/SHA256SUMS \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            # --generate-notes asks GitHub to create release notes from commits and merged PRs.
            gh release create "${TAG}" \
              dist/aether-mcp-server \
              dist/aether-mcp-server-linux-x86_64.tar.gz \
              dist/SHA256SUMS \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AETHER_02 ${TAG}" \
              --generate-notes \
              ${PRERELEASE_FLAG}
          fi
