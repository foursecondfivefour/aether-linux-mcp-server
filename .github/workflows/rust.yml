name: Rust Auto Release

on:
  push:
    branches: [ "main" ] # Запуск при каждом пуше в main

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Требуется для создания релизов и тегов

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Скачивает всю историю для корректного подсчета версии

      # 1. Автоматическое определение версии (начиная с 1.0.0)
      - name: Auto-generate Tag and Version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # По умолчанию увеличивает patch-версию (1.0.0 -> 1.0.1)
          initial_version: 1.0.0 # Стартовая точка для вашего проекта

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      # 2. Сборка проекта в релизном режиме
      - name: Build Release
        run: cargo build --release --verbose

      # 3. Архивация бинарника AETHER_01
      - name: Prepare Artifact
        run: |
          mkdir -p staging
          cp target/release/AETHER_01 staging/
          cd staging && tar -czf ../AETHER_01-linux-amd64.tar.gz *

      # 4. Создание GitHub Release с автоматически сгенерированным тегом
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          artifacts: "AETHER_01-linux-amd64.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}
