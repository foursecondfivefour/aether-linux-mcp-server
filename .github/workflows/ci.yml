name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build debug binary for smoke test
        run: cargo build

      - name: Stdio smoke test
        run: python3 scripts/smoke_stdio.py

      - name: Mocked MCP action matrix
        run: python3 scripts/mock_matrix.py

  package:
    name: Package checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate installer JavaScript
        run: node --check scripts/install/install.js

      - name: Validate JSON metadata
        run: |
          python3 -m json.tool package.json >/dev/null
          python3 -m json.tool integrations/lobehub/lhm.plugin.json >/dev/null

      - name: npm package dry run
        run: npm pack --dry-run
